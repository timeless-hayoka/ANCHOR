    .gridbg,.scan{position:fixed;inset:0;pointer-events:none;z-index:1}
    .gridbg{background-image:linear-gradient(rgba(54,226,122,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(54,226,122,.05) 1px,transparent 1px);background-size:44px 44px;opacity:.85}

    .brand .tag{margin-top:4px;color:var(--cyan);font-size:10px;letter-spacing:.2em;text-transform:uppercase}

    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.02);font:600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.04em;color:var(--text)}

    .dot.amber{background:var(--amber);box-shadow:0 0 8px var(--amber)}
    .dot.red{background:var(--red);box-shadow:0 0 8px var(--red)}
    .dot.cyan{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

    .panel{background:rgba(13,19,31,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

    .hero .metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}

    .card .desc{margin-top:6px;font-size:12px;color:var(--muted)}

    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}

    .row:hover{background:rgba(54,226,122,.08)}

    .timeline .item{position:relative;margin:0 0 12px;padding-left:2px}

    .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .formgrid label{display:block}

    .btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);padding:9px 13px;border-radius:999px;cursor:pointer;text-decoration:none;transition:.15s}

    .log{display:flex;flex-direction:column;gap:10px}
    .log-item{padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02)}
    .log-item .t{font:10px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan)}
    .log-item .m{margin-top:6px;color:var(--text);line-height:1.55}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .chat{display:flex;flex-direction:column;height:520px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.02)}
    .chat .head{padding:12px 14px;border-bottom:1px solid var(--line);background:var(--panel2);display:flex;justify-content:space-between;gap:10px;align-items:center}
    .chat .body{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .bubble{max-width:84%;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:rgba(255,255,255,.02)}
    .bubble.me{align-self:flex-end;border-color:rgba(63,217,230,.4);background:rgba(63,217,230,.08)}
    .bubble.bot{align-self:flex-start;border-color:rgba(54,226,122,.4);background:rgba(54,226,122,.06)}
    .bubble .role{font:10px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.16em;text-transform:uppercase;margin-bottom:5px;color:inherit}
    .chat .foot{display:flex;gap:10px;padding:12px 14px;border-top:1px solid var(--line);background:var(--panel2)}
    .chat textarea{flex:1;resize:none;min-height:46px;max-height:120px;background:#0a0f0b;border:1px solid var(--line);border-radius:12px;color:var(--text);padding:10px 12px;outline:none}
    .chat .send{align-self:flex-end}
    .score{font:800 42px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1}
    .bar{height:8px;border-radius:999px;background:#10180f;border:1px solid var(--line);overflow:hidden}
    .bar > div{height:100%;background:var(--phos);box-shadow:0 0 8px var(--phos)}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .footer{padding:14px 18px;color:var(--muted);font-size:12px;line-height:1.6}
    .section-head{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .status{font:11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase}
    @media (max-width:1100px){.main{flex-direction:column}.nav{width:auto;flex-direction:row;flex-wrap:wrap;border-right:0;border-bottom:1px solid var(--line)}.nav .foot{margin-top:0;flex:1 1 100%}.hero,.split,.grid.two,.grid-3{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr}.formgrid .full{grid-column:auto}.thead,.row{grid-template-columns:1.2fr .75fr 1fr .65fr .5fr}}
    @media (max-width:720px){.hero{grid-template-columns:1fr}.hero .metrics{grid-template-columns:1fr}.thead{display:none}.row{grid-template-columns:1fr;gap:6px}.row span:nth-child(n+2){font-size:11px}.chat{height:440px}}
  </style>
</head>

      const ui = {N:0.85,R:0.62}[state.ui] || 0.85;
      const prU = {N:0.85,L:0.62,H:0.27};
      const prC = {N:0.85,L:0.68,H:0.5};
      const pr = (state.scope === 'C' ? prC : prU)[state.pr] || 0.85;
      const c = {H:0.56,L:0.22,N:0}[state.c] || 0;
      const i = {H:0.56,L:0.22,N:0}[state.i] || 0;
      const a = {H:0.56,L:0.22,N:0}[state.a] || 0;
      return {av,ac,ui,pr,c,i,a};
    }
    function roundUp1(v){ return Math.ceil(v * 10) / 10; }
    function calcCvss(state){
      const w = cvssWeights(state);
      const impactSub = 1 - ((1 - w.c) * (1 - w.i) * (1 - w.a));
      const exploitability = 8.22 * w.av * w.ac * w.pr * w.ui;
      let impact = 0;
      let base = 0;
      if (state.scope === 'U') {
        impact = 6.42 * impactSub;
        base = Math.min(impact + exploitability, 10);
      } else {
        impact = 7.52 * (impactSub - 0.029) - 3.25 * Math.pow(impactSub - 0.02, 15);
        base = Math.min(1.08 * (impact + exploitability), 10);
      }
      return {score: roundUp1(Math.max(base, 0)), impact, exploitability};
    }
    const cvssState = {av:'N', ac:'L', pr:'N', ui:'N', scope:'U', c:'H', i:'H', a:'H'};
    function renderCvss(){
      const result = calcCvss(cvssState);
      const severity = result.score >= 9 ? 'critical' : result.score >= 7 ? 'high' : result.score >= 4 ? 'medium' : 'low';
      return `<div class="section"><div class="section-head"><h2>CVSS Calculator</h2><span class="status">live score</span></div><div class="sub">A dedicated calculator for translating a finding into a base score and a reviewable vector string.</div><div class="split"><div class="card"><div class="label">vector</div><div class="score" style="margin-top:8px;color:${severity==='critical'?C.red:severity==='high'?C.amber:severity==='medium'?C.cyan:C.phos}">${result.score.toFixed(1)}</div><div class="desc" style="margin-top:8px;word-break:break-all">${cvssVector(cvssState)}</div><div class="bar" style="margin-top:12px"><div style="width:${Math.min(100,(result.score/10)*100)}%;background:${severity==='critical'?C.red:severity==='high'?C.amber:severity==='medium'?C.cyan:C.phos};box-shadow:0 0 8px ${severity==='critical'?C.red:severity==='high'?C.amber:severity==='medium'?C.cyan:C.phos}"></div></div><div class="desc" style="margin-top:8px">Impact ${result.impact.toFixed(2)} · Exploitability ${result.exploitability.toFixed(2)}</div></div><div class="card"><div class="label">controls</div><div class="grid" style="grid-template-columns:repeat(2,minmax(0,1fr));margin-top:8px">${[
        ['Attack Vector','av',{N:'Network',A:'Adjacent',L:'Local',P:'Physical'}],['Attack Complexity','ac',{L:'Low',H:'High'}],['Privileges Required','pr',{N:'None',L:'Low',H:'High'}],['User Interaction','ui',{N:'None',R:'Required'}],['Scope','scope',{U:'Unchanged',C:'Changed'}],['Confidentiality','c',{H:'High',L:'Low',N:'None'}],['Integrity','i',{H:'High',L:'Low',N:'None'}],['Availability','a',{H:'High',L:'Low',N:'None'}],
      ].map(([label,key,opts])=>`<label><span>${label}</span><select data-cvss="${key}">${Object.entries(opts).map(([k,v])=>`<option value="${k}" ${cvssState[key]===k?'selected':''}>${v}</option>`).join('')}</select></label>`).join('')}</div></div></div></div>`;
    }
    function renderEvidence(){
      return `<div class="section"><div class="section-head"><h2>Evidence & Provenance</h2><span class="status">signed bundle</span></div><div class="sub">This panel mirrors the product story from the zip: versioned events, evidence signing, and a tamper-evident local workflow.</div><div class="grid two">${Object.entries(PROVENANCE).map(([k,v])=>`<div class="card"><div class="label">${k}</div><div class="value" style="font-size:18px;color:${C.cyan}">${v}</div></div>`).join('')}</div><div class="grid two" style="margin-top:12px">${BOUNTY.map((b,i)=>`<div class="card"><div class="label">${b.label}</div><div class="value" style="font-size:28px;color:${[C.phos,C.cyan,C.amber,C.lime][i]}">${b.value}</div><div class="desc">${b.desc}</div></div>`).join('')}</div><div class="card" style="margin-top:12px"><div class="label">updated info</div><div class="desc">FastAPI backend with SSE live-run support, stop/cancel endpoints, registry and case routes, Ed25519 evidence signing, demo-mode labeling, and a login gate for localhost use.</div><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn" id="signEvidence">Export signed evidence bundle</button><span class="badge cyan">/api/trinity/evidence/sign</span></div><div class="desc" id="evidenceStatusMsg" style="margin-top:10px">Click the button to ask the local server to sign the current fixture bundle.</div></div></div>`;
    }
    function renderArena(){
      return `<div class="section"><div class="section-head"><h2>DVD Arena</h2><span class="status">field deployment</span></div><div class="sub">A compact mirror of the challenge results and their execution artifacts.</div><div class="controls"><span class="badge cyan">0 SOLVED</span><span class="badge amber">2 FAILED</span><span class="badge">1 SKIPPED</span></div><div class="grid cards">${DVD.map(d=>{ const col = d.skipped ? C.faint : d.success ? C.phos : C.red; const status = d.skipped ? 'SKIPPED' : d.success ? 'SOLVED' : 'FAILED'; return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div class="mono" style="font-size:15px">${d.challenge}</div><div style="color:${col}">${d.skipped?'−':d.success?'✓':'✕'}</div></div><div class="mono small muted" style="margin-top:6px">${d.test_path}</div><div style="margin-top:12px"><span class="badge" style="color:${col};border-color:${col}55">${status}</span><span class="badge">rc ${d.returncode}</span><span class="badge">${d.duration_sec.toFixed(2)}s</span>${d.requires_fork?'<span class="badge cyan">FORK</span>':''}</div><div style="margin-top:12px;padding:10px;border-radius:8px;background:#0a0f0b;border:1px solid var(--line)"><div class="small muted mono">assertion</div><div class="small" style="margin-top:5px;line-height:1.5;color:${d.skipped?C.muted:C.red}">${d.reason}</div></div></div>`}).join('')}</div></div>`;
    }
    function renderReport(){
      return `<div class="section"><div class="section-head"><h2>Evidence Builder</h2><span class="status">report.md</span></div><div class="sub">This is the part of the product that turns the run into a reviewable artifact with source, impact, steps, and remediation.</div><div class="controls"><select id="loadCase"><option value="">Load from finding...</option>${CASES.filter(c=>c.validation_state==='REPRODUCED_REAL').map(c=>`<option value="${c.case_id}">${c.case_id}</option>`).join('')}</select><button class="btn" id="clearReport">Clear</button><button class="btn" id="copyReport">Copy report</button></div><div class="formgrid">${[
        ['Title','title'],['Severity','severity'],['Classification','swc'],['Target','target'],['Network','network'],['Commit / version','commit'],['Summary','summary','full'],['Impact','impact','full'],['Affected code (file:line)','affected'],['Vulnerable snippet','code','full'],['Steps to reproduce','steps','full'],['Proof of concept','poc','full'],['Recommended remediation','fix','full'],['Reporter','reporter'],['References','refs','full'],
      ].map(([label,key,mode])=>`<label class="${mode==='full'?'full':''}"><span>${label}</span>${['summary','impact','code','steps','poc','fix','refs'].includes(key) ? `<textarea data-field="${key}" rows="${key==='code'?6:key==='steps'?4:key==='poc'?3:key==='refs'?2:3}"></textarea>` : key==='severity' ? `<select data-field="${key}">${['Critical','High','Medium','Low'].map(v=>`<option>${v}</option>`).join('')}</select>` : `<input data-field="${key}">`}</label>`).join('')}<div class="full"><div class="section-head" style="padding:0 0 8px;border:0"><h2 style="margin:0">report.md preview</h2></div><pre class="preview" id="reportPreview"></pre></div></div></div>`;
    }
    function renderTrinity(){
      return `<div class="section"><div class="section-head"><h2>Trinity Chat</h2><span class="status">server-side</span></div><div class="sub">Prompt the local server, not the browser. This keeps the console safe while still feeling conversational.</div><div class="chat"><div class="head"><div class="mono" style="color:${C.phos}">TRINITY</div><div class="badge cyan">ANCHOR analysis agent</div></div><div class="body" id="chatBody">${chatMessages.map(m=>`<div class="bubble ${m.role==='user'?'me':'bot'}"><div class="role">${m.role==='user'?'YOU':'TRINITY'}</div><div>${escapeHtml(m.text)}</div></div>`).join('')}</div><div class="foot"><textarea id="chatInput" placeholder="Ask Trinity about the run, a finding, a severity call, or a report..."></textarea><button class="btn send" id="chatSend">Send</button></div></div></div>`;
    }
    function render(){
      renderPills();
      el('nav').innerHTML = nav.map(([id,label]) => `<button class="${view===id?'active':''}" data-view="${id}"><span>${label}</span></button>`).join('') + `<div class="foot"><div class="mono" style="display:flex;align-items:center;gap:8px;color:var(--cyan)">◌ OBSERVATION MODE</div><div class="mini">lab scope · read-only · authorized-lab · local passphrase required for the hunt console.</div></div>`;
      document.querySelectorAll('#nav button[data-view]').forEach(b => b.addEventListener('click', () => { view = b.dataset.view; renderView(); }));
      renderView();
    }
    function renderView(){
      el('pageTitle').textContent = nav.find(n => n[0] === view)[1];
      let body = '';
      if (view === 'mission') body = renderMission();
      if (view === 'gate') body = renderGate();
      if (view === 'boot') body = renderBoot();
      if (view === 'recon') body = renderRecon();
      if (view === 'history') body = renderHistory();
      if (view === 'dossiers') body = renderDossiers();
      if (view === 'arena') body = renderArena();
      if (view === 'cvss') body = renderCvss();
      if (view === 'report') body = renderReport();
      if (view === 'trinity') body = renderTrinity();
      el('panel').innerHTML = body;
      document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      document.querySelectorAll('[data-case]').forEach(node => node.addEventListener('click', e => { e.stopPropagation(); loadCase(node.dataset.case); }));
      document.querySelectorAll('[data-dossier]').forEach(node => node.addEventListener('click', () => { window.dossierIndex = Number(node.dataset.dossier); renderView(); }));
      document.querySelectorAll('[data-cvss]').forEach(node => node.addEventListener('change', () => { cvssState[node.dataset.cvss] = node.value; renderView(); }));
      const q = document.getElementById('filterQ'); if (q) q.addEventListener('input', renderView);
      const fs = document.getElementById('filterState'); if (fs) fs.addEventListener('change', renderView);
      const lc = document.getElementById('loadCase'); if (lc) lc.addEventListener('change', () => { if (lc.value) loadCase(lc.value); });
      const cr = document.getElementById('clearReport'); if (cr) cr.addEventListener('click', () => { renderView(); });
      const copy = document.getElementById('copyReport'); if (copy) copy.addEventListener('click', async () => { try { await navigator.clipboard.writeText(buildReportFromState()); copy.textContent = 'Copied'; setTimeout(() => copy.textContent = 'Copy report', 1200); } catch {} });
      const signEvidence = document.getElementById('signEvidence'); if (signEvidence) signEvidence.addEventListener('click', signEvidenceBundle);
      const runGate = document.getElementById('runGate'); if (runGate) runGate.addEventListener('click', runGateAnimation);
      document.querySelectorAll('[data-field]').forEach(elm => elm.addEventListener('input', () => { reportState[elm.dataset.field] = elm.value; document.getElementById('reportPreview').textContent = buildReportFromState(); }));
      if (document.getElementById('reportPreview')) document.getElementById('reportPreview').textContent = buildReportFromState();
      const chatSend = document.getElementById('chatSend');
      if (chatSend) chatSend.addEventListener('click', sendChat);
      const chatInput = document.getElementById('chatInput');
      if (chatInput) chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });
      bindDrawer();
    }
    const reportState = { title:'', severity:'High', swc:'', target:'', network:'Authorized lab (Foundry)', commit:'', reporter:'', summary:'', impact:'', affected:'', code:'', steps:'', poc:'', fix:'', refs:'' };
    function buildReportFromState(){
      const f = reportState;
      return [`# [${(f.severity||'').toUpperCase()}] ${f.title || 'Untitled finding'}`,'','## Summary',f.summary || '_Two or three sentences: what the bug is and why it matters._','','## Target',`- Contract: ${f.target || '_contract / address_'}`,`- Network: ${f.network || '_network_'}`,f.commit ? `- Commit / version: ${f.commit}` : null,`- Classification: ${f.swc || '_SWC-XXX_'}`,'','## Impact',f.impact || '_What an attacker gains. Funds at risk and who is affected._','',f.affected || f.code ? ['## Affected code', f.affected ? `\`${f.affected}\`` : null, f.code ? ['```solidity', f.code, '```'].join('
') : null, ''].filter(Boolean).join('
') : '', '## Steps to reproduce',f.steps || '1. _..._','','## Proof of concept',f.poc ? `\`\`\`
${f.poc}
\`\`\`` : '_Command or test that demonstrates the exploit._','','## Recommended remediation',f.fix || '_The fix._',f.refs ? ['', '## References', f.refs].join('
') : '', '', '---', `Reported by: ${f.reporter || '_handle_'}`, `Date: ${new Date().toISOString().slice(0,10)}`].filter(v=>v!==null).join('
');
    }
    function loadCase(caseId){
      const c = [...CASES, ...ARCHIVE].find(x => x.case_id === caseId); if(!c) return; const meta = c.swc ? SWC[c.swc] : null; const src = c.contract ? SOURCE[c.contract] : null; const ex = c.execution_artifacts[0];
      reportState.title = meta ? `${meta.name} in ${c.contract || c.case_id}` : `Finding in ${c.case_id}`;
      reportState.severity = meta ? (meta.sev.charAt(0).toUpperCase() + meta.sev.slice(1)) : 'High';
      reportState.swc = c.swc ? `${c.swc} (${meta.name})` : '';
      reportState.target = c.contract ? `${c.contract}.sol` : c.case_id;
      reportState.network = 'Authorized lab (Foundry)';
      reportState.summary = meta ? `${meta.name}. Correlated across tools and reproduced with a real proof-of-concept (validation state ${c.validation_state}).` : '';
      reportState.impact = meta ? `An attacker can exploit the ${meta.name.toLowerCase()} to compromise contract funds or control. Reproduced with ${c.execution_artifacts[0]?.assertion_count || 1} passing assertion(s).` : '';
      reportState.affected = src && src.vulnLine ? `${c.contract}.sol:${src.vulnLine}` : (c.contract ? `${c.contract}.sol` : '');
      reportState.code = src ? src.code : '';
      reportState.steps = ex ? '1. Compile the target with Foundry.
2. Run the generated proof-of-concept test.
3. Observe the exploit assertion pass.' : '';
      reportState.poc = ex ? `forge test --match-path ${ex.test_path} -vvv` : '';
      reportState.fix = meta ? meta.fix : '';
      reportState.refs = c.swc ? `- SWC registry: ${c.swc}` : '';
      view = 'report'; renderView();
    }
    function bindDrawer(){
      const drawer = document.getElementById('drawer'); const panel = document.getElementById('drawerPanel');
      const close = () => drawer.classList.remove('open');
      drawer.onclick = e => { if (e.target === drawer) close(); };
      window.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
      window.openCase = (caseId) => {
        const c = [...CASES, ...ARCHIVE].find(x => x.case_id === caseId); if (!c) return;
        const meta = c.swc ? SWC[c.swc] : null; const ex = c.execution_artifacts[0];
        const source = c.contract && SOURCE[c.contract] ? `<div class="source"><div class="head"><div class="mono">${c.contract}.sol</div><div class="mono" style="color:${c.swc ? (meta.sev === 'critical' ? C.red : meta.sev === 'high' ? C.amber : C.cyan) : C.phos}">${c.swc ? 'VULN @ L' + SOURCE[c.contract].vulnLine : 'NEGATIVE CONTROL'}</div></div><pre>${escapeHtml(SOURCE[c.contract].code)}</pre></div>` : '';
        panel.innerHTML = `<div class="drawer-top"><div><div class="mono small muted">specimen file</div><div class="mono" style="font-size:20px;margin-top:6px">${c.case_id}</div></div><button class="x" id="closeDrawer">✕</button></div><div style="margin-top:14px"><span class="badge ${c.validation_state==='REPRODUCED_REAL'?'phos':c.validation_state==='UNAVAILABLE'?'cyan':'amber'}">${c.validation_state==='REPRODUCED_REAL'?'CONFIRMED KILL':c.validation_state==='UNAVAILABLE'?'TOOL UNAVAILABLE / NOT TESTED':'CONTAINED'}</span></div><div style="margin-top:18px">${ladder(c.validation_state,false)}</div>${meta?`<div class="card" style="margin-top:18px;border-color:${meta.sev==='critical'?C.red:meta.sev==='high'?C.amber:C.cyan}40"><div style="display:flex;justify-content:space-between;align-items:center"><div class="mono" style="color:${meta.sev==='critical'?C.red:meta.sev==='high'?C.amber:C.cyan}">${c.swc}</div><div class="badge ${meta.sev==='critical'?'red':meta.sev==='high'?'amber':'cyan'}">${meta.sev.toUpperCase()}</div></div><div style="margin-top:6px;font-size:14px">${meta.name}</div><div style="margin-top:12px"><div class="section-head" style="padding:0;border:0"><h2 style="margin:0">remediation</h2></div><div class="small muted" style="margin-top:5px;line-height:1.55">${meta.fix}</div></div></div>`:''}<div style="display:flex;gap:10px;margin-top:18px"><div class="card" style="flex:1"><div class="label">expected</div><div class="mono">${c.expected.join(', ') || 'none'}</div></div><div class="card" style="flex:1"><div class="label">detected</div><div class="mono" style="color:${c.detected.length?C.phos:C.muted}">${c.detected.join(', ') || 'none'}</div></div></div>${source}${ex?`<div class="card" style="margin-top:18px"><div class="label" style="color:${C.phos}">proof-of-concept execution</div><div class="small" style="display:grid;gap:8px;margin-top:10px"><div style="display:flex;justify-content:space-between;gap:12px"><span class="muted">exploit_verified</span><span>${String(ex.exploit_verified)}</span></div><div style="display:flex;justify-content:space-between;gap:12px"><span class="muted">assertion_count</span><span>${String(ex.assertion_count)}</span></div><div style="display:flex;justify-content:space-between;gap:12px"><span class="muted">test_path</span><span class="mono" style="text-align:right;word-break:break-all">${ex.test_path}</span></div></div></div>`:''}<div class="mono small muted" style="margin-top:18px">captured ${c.timestamp}</div>`;
        drawer.classList.add('open');
        document.getElementById('closeDrawer').onclick = close;
      };
    }
    function renderClock(){ const c = document.getElementById('clock'); if(c) c.textContent = new Date().toISOString().slice(11,19) + 'Z'; }
    async function fetchJSON(url, opts){ const res = await fetch(url, opts); const data = await res.json().catch(() => ({})); if (!res.ok) throw new Error(data.detail || data.error || res.statusText); return data; }
    async function bootstrap(){
      try {
        const [session, health, snapshot, paths] = await Promise.all([
          fetchJSON('/api/anchor/session'),
          fetchJSON('/api/health'),
          fetchJSON('/api/anchor/snapshot?limit=8'),
          fetchJSON('/api/trinity/paths').catch(() => ({})),
        ]);
        window.__ANCHOR_SNAPSHOT__ = snapshot;
        window.__ANCHOR_RELEASE__ = snapshot?.identity?.version || session.release || '{{ANCHOR_RELEASE}}';
        window.__ANCHOR_LATEST_RUN_ID__ = snapshot?.history?.runs?.[0]?.case_id || snapshot?.history?.runs?.[0]?.run_id || 'demo_reentrancy';
        const pills = [
          ['slither',true],['forge',true],['myth',false],['echidna-test',true],['medusa',true],
        ];
        el('pills').innerHTML = pills.map(([k,on])=>`<span class="pill"><span class="dot ${on?'phos':'amber'}"></span>${k}</span>`).join('') + `<span class="pill"><span class="dot cyan"></span><span id="clock"></span></span><span class="pill"><span class="dot ${session.authenticated ? 'phos' : 'amber'}"></span>${session.authenticated ? 'authenticated' : 'login required'}</span>`;
        const existing = runEvents.slice();
        if (snapshot && snapshot.history && Array.isArray(snapshot.history.runs) && snapshot.history.runs.length) {
          runEvents = snapshot.history.runs.slice(0, 6).map((run, idx) => ({ time: `run.${idx + 1}`, title: run.title || run.id || 'Run event', note: run.summary || 'Loaded from /api/anchor/snapshot' }));
        } else {
          runEvents = existing;
        }
        render();
        maybeAttachStream();
      } catch (e) {
        el('pills').innerHTML = `<span class="pill"><span class="dot amber"></span>offline fallback</span>`;
        render();
      }
    }
    function maybeAttachStream(){
      const runId = window.__ANCHOR_LATEST_RUN_ID__ || 'demo_reentrancy';
      const url = `/api/trinity/runs/${encodeURIComponent(runId)}/events`;
      try {
        const es = new EventSource(url);
        es.onmessage = evt => {
          try {
            const data = JSON.parse(evt.data);
            const title = data.event_type || data.event || data.type || 'event';
            const note = data.summary || data.note || data.message || data.detail || '';
            runEvents = [...runEvents.slice(-18), { time: data.timestamp || data.time || data.ts || 'event', title, note }];
            if (view === 'history') renderView();
          } catch (err) {}
        };
        es.onerror = () => es.close();
      } catch (err) {}
    }
    async function sendChat(){
      const input = document.getElementById('chatInput');
      if (!input) return;
      const value = input.value.trim();
      if (!value) return;
      chatMessages.push({role:'user', text:value});
      input.value = '';
      renderView();
      try {
        const data = await fetchJSON('/api/trinity/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message:value})});
        chatMessages.push({role:'assistant', text:data.reply || 'No reply returned.'});
      } catch (e) {
        chatMessages.push({role:'assistant', text:'Trinity could not reach the server chat route. Check login and try again.'});
      }
      renderView();
      const body = document.getElementById('chatBody');
      if (body) body.scrollTop = body.scrollHeight;
    }
    document.addEventListener('click', e => {
      const target = e.target.closest('[data-case]'); if (target) { window.openCase(target.dataset.case); }
    });
    bootstrap();
    setInterval(renderClock, 1000);
    function buildReport(){ return buildReportFromState(); }
  </script>
